on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write

name: Release Please (Automatic Changelog & Release)

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - uses: googleapis/release-please-action@v4
        with:
          # Uses the config and manifest for path filtering
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
